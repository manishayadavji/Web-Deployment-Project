<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Food App</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    h1 {
      background: red;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .tagline {
      text-align: center;
      color: green;
      font-weight: bold;
      margin: 10px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
      text-align: center;
    }

    img {
      width: 100%;
      height: 150px;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🍔 Food Delivery App</h1>
<p class="tagline">🔥 Free for DevOps Engineers 😎</p>

<div class="container">

<div class="card">
<img src="https://source.unsplash.com/300x200/?pizza">
<h3>Pizza</h3>
<p class="price">₹199</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?burger">
<h3>Burger</h3>
<p class="price">₹149</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?biryani">
<h3>Biryani</h3>
<p class="price">₹249</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?pasta">
<h3>Pasta</h3>
<p class="price">₹179</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?noodles">
<h3>Noodles</h3>
<p class="price">₹119</p>
<button>Order</button>
</div>

<div class="card">
<img src="https://source.unsplash.com/300x200/?sandwich">
<h3>Sandwich</h3>
<p class="price">₹99</p>
<button>Order</button>
</div>

</div>

</body>
</html>
